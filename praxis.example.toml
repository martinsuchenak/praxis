# Praxis Configuration
# Copy to praxis.toml and edit. Config resolution: env vars > praxis.toml > defaults.

[watchdog]
port = "7700"                    # Gossip listen port
# advertise = ""                 # Override advertise address (default: 0.0.0.0:<port>)
# seeds = ["192.168.1.10:7700"]  # Gossip seed peers
# secret = ""                    # Global gossip auth secret
sandbox = "auto"                 # auto|bwrap|none
# mounts = ""                    # Extra bwrap mounts
# allowlist = []                 # Shell command allowlist (empty = all)
# auth_disabled = false          # Disable secret validation (dev mode)
# node_name = ""                 # Human-readable node name
# multicast_addr = ""            # Multicast group (default: 239.255.13.37)
# multicast_port = 19373         # Multicast port
# models_dir = ""                # Directory with .gguf files for local inference

[tsnet]
# hostname = ""                  # Enable tsnet remote connectivity
# dir = ""                       # Tsnet state directory (default: <project>/.tsnet)
# authkey = ""                   # Tailscale auth key
# control_url = ""               # Custom coordination server (e.g. Headscale)

[bot]
base_url = ""                    # LLM API base URL
model = ""                       # Default model ID
api_key = ""                     # LLM API key
tick_interval = 30               # Seconds between bot ticks
tick_max_iterations = 5          # Max iterations per tick
# log_verbose = false
# log_result_max = 80
# stale_threshold = 120
# script_timeout = 30
# max_backoff = 600
# max_concurrent = 1
# http_allowlist = ""
# shell_allowlist = ""
# gossip_secret = ""
# stuck_ticks = 5

[models]
default = ""                     # Default model ID (overrides [bot].model if set)

# [[models.catalog]]
# id = "model-id"
# label = "Display Name"
# description = "When to use this model"
# cost = "low"
# strengths = ["fast", "tool calling"]
# concurrency = 2
# thinking_template = "qwen"     # qwen|ollama|openai|anthropic|glm|gemini_flash|mistral
# base_url = ""                  # Per-model API base URL override
# api_key = ""                   # Per-model API key override

# [[workspace]]
# name = "my-project"
# path = "/home/user/projects/my-project"
# secret = ""                    # Workspace-specific gossip secret
# scope = "isolated"             # open|isolated|family|gateway
# allow_cross = false

# [hooks]
# Lifecycle hooks run shell commands or HTTP endpoints at bot lifecycle points.
# Each event accepts an array of handler objects.
# Handler fields: type (required: "command" or "http"), command or url, timeout, async.
# Blocking events (pre_spawn, pre_tick, pre_tool_use) can prevent the action.
# Exit 0 = success (parse stdout as JSON), Exit 2 = block (stderr = reason).

# pre_spawn = [
#   { type = "command", command = "/path/to/validate.sh", timeout = 30 }
# ]
# post_spawn = [
#   { type = "command", command = "/path/to/log.sh" }
# ]
# pre_start = []
# post_start = []
# pre_stop = []
# post_stop = [
#   { type = "http", url = "http://localhost:8080/hooks/stop", timeout = 10 }
# ]
# pre_kill = []
# post_kill = []
# post_crash = [
#   { type = "command", command = "/path/to/alert.sh", async = true }
# ]
# pre_tick = []
# post_tick = []
# pre_tool_use = [
#   { type = "command", command = "/path/to/check-tool.sh", timeout = 15 }
# ]
# post_tool_use = []
# on_message = [
#   { type = "http", url = "http://localhost:8080/hooks/message", async = true }
# ]
# on_stuck = []

# MCP servers expose external tools to bots via the Model Context Protocol.
# Tools from each server are bridged into the bot's tool registry at startup.
# Tool names are prefixed: <namespace>__<tool_name> (e.g. github__search_code).
# Standard config format compatible with Claude Code, Cursor, and other AI agents.

# [[mcp]]
# name = "github"                                 # Human-readable identifier
# url = "http://localhost:8080/mcp"               # MCP server URL (streamable HTTP or SSE)
# namespace = "github"                            # Tool name prefix (default: name)
# bearer_token = ""                               # Optional auth token

# [[mcp]]
# name = "filesystem"
# url = "http://localhost:8081/mcp"
# namespace = "fs"
